name: validate-configs

on:
  push:
    branches: ["main"]
    paths:
      - "prometheus/**"
      - "alertmanager/**"
      - "loki/**"
      - "promtail/**"
      - "docker-compose.yml"
      - ".yamllint.yml"
      - ".github/workflows/validate-configs.yml"

  pull_request: {}

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-configs-${{ github.ref }}
  cancel-in-progress: true

env:
  PROM_IMAGE: prom/prometheus@sha256:4a61322ac1103a0e3aea2a61ef1718422a48fa046441f299d71e660a3bc71ae9
  AM_IMAGE: prom/alertmanager@sha256:88b605de9aba0410775c1eb3438f951115054e0d307f23f274a4c705f51630c1

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install yamllint

      - name: Lint yaml
        run: |
          yamllint -c .yamllint.yml .

  promtool:
    runs-on: ubuntu-latest
    needs: yamllint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prometheus config check
        run: |
          docker run --rm \
            --entrypoint /bin/promtool \
            -v "$PWD/prometheus:/etc/prometheus:ro" \
            "${PROM_IMAGE}" \
            check config /etc/prometheus/prometheus.yml

      - name: Prometheus rules check
        run: |
          docker run --rm \
            --entrypoint /bin/promtool \
            -v "$PWD/prometheus:/etc/prometheus:ro" \
            "${PROM_IMAGE}" \
            check rules /etc/prometheus/alerts.yml

  amtool:
    runs-on: ubuntu-latest
    needs: yamllint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Alertmanager config check
        run: |
          docker run --rm \
            --entrypoint /bin/amtool \
            -v "$PWD/alertmanager:/etc/alertmanager:ro" \
            "${AM_IMAGE}" \
            check-config /etc/alertmanager/alertmanager.yml
