name: tg-relay

on:
  pull_request:
    paths:
      - "tg-relay/**"
      - ".github/workflows/tg-relay.yml"

  push:
    branches: ["main"]
    paths:
      - "tg-relay/**"
      - ".github/workflows/tg-relay.yml"
    tags: ["v*"]

  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: tg-relay-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/elyablack/tg-relay

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      service_changed: ${{ steps.filter.outputs.tg_relay_service }}
      workflow_changed: ${{ steps.filter.outputs.tg_relay_workflow }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Paths filter
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            tg_relay_service:
              - 'tg-relay/**'
            tg_relay_workflow:
              - '.github/workflows/tg-relay.yml'

  build:
    needs: changes
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' ||
      startsWith(github.ref, 'refs/tags/v') ||
      needs.changes.outputs.service_changed == 'true' ||
      needs.changes.outputs.workflow_changed == 'true'
    outputs:
      shortsha: ${{ steps.vars.outputs.shortsha }}
      version: ${{ steps.vars.outputs.version }}
      is_tag: ${{ steps.vars.outputs.is_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Vars
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          echo "shortsha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            ver="${GITHUB_REF#refs/tags/v}"
            echo "version=$ver" >> "$GITHUB_OUTPUT"
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Build (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ./tg-relay
          file: ./tg-relay/Dockerfile
          push: false
          build-args: |
            APP_VERSION=pr-${{ github.event.pull_request.number }}-${{ steps.vars.outputs.shortsha }}
          tags: ${{ env.IMAGE }}:pr-${{ github.event.pull_request.number }}

      - name: Build and push (tag release)
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v7
        with:
          context: ./tg-relay
          file: ./tg-relay/Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.vars.outputs.version }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.vars.outputs.version }}
            ${{ env.IMAGE }}:stable
            ${{ env.IMAGE }}:latest

      - name: Build and push (main)
        if: github.event_name != 'pull_request' && !startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v7
        with:
          context: ./tg-relay
          file: ./tg-relay/Dockerfile
          push: true
          build-args: |
            APP_VERSION=sha-${{ steps.vars.outputs.shortsha }}
          tags: |
            ${{ env.IMAGE }}:sha-${{ steps.vars.outputs.shortsha }}

  deploy:
    needs: [changes, build]
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.build.result == 'success' &&
      needs.changes.outputs.service_changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.readmode.outputs.mode }}
    steps:
      - name: Deploy on VPS (health-wait + rollback + prune)
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail
            cd /srv/monitoring
            exec 9>/tmp/monitoring-deploy.lock
            flock 9

            wait_health() {
              for i in $(seq 1 30); do
                hs="$(docker inspect tg-relay --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' 2>/dev/null || echo none)"
                if [ "$hs" = "healthy" ] || [ "$hs" = "none" ]; then
                  return 0
                fi
                sleep 2
              done
              return 1
            }

            rm -f /tmp/tg-relay-deploy-mode

            export TG_RELAY_TAG=sha-${{ needs.build.outputs.shortsha }}
            docker compose pull tg-relay
            docker compose up -d tg-relay

            if wait_health; then
              echo sha-${{ needs.build.outputs.shortsha }} > /tmp/tg-relay-deploy-mode
              docker compose ps tg-relay
              docker image prune -af --filter "until=168h" || true
              docker builder prune -af --filter "until=168h" || true
              exit 0
            fi

            export TG_RELAY_TAG=stable
            docker compose pull tg-relay || true
            docker compose up -d tg-relay

            if wait_health; then
              echo rollback > /tmp/tg-relay-deploy-mode
              docker compose ps tg-relay
              docker image prune -af --filter "until=168h" || true
              docker builder prune -af --filter "until=168h" || true
              exit 0
            fi

            echo failed > /tmp/tg-relay-deploy-mode
            docker compose ps tg-relay
            exit 1

      - name: Read deploy mode (ssh)
        id: readmode
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p ${{ secrets.VPS_PORT }}"
          HOST="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          mode="$(ssh $SSH_OPTS "$HOST" 'cat /tmp/tg-relay-deploy-mode 2>/dev/null || echo unknown')"
          mode="$(printf '%s' "$mode" | tr -d '\r\n')"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"

  notify:
    needs: [deploy]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Notify telegram
        shell: bash
        env:
          DEPLOY_STATUS: ${{ needs.deploy.result }}
          DEPLOY_MODE: ${{ needs.deploy.outputs.mode }}
          BRANCH_NAME: ${{ github.ref_name }}
          FULL_SHA: ${{ github.sha }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REPO_NAME: ${{ github.repository }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          status = os.environ["DEPLOY_STATUS"]
          mode = os.environ.get("DEPLOY_MODE", "unknown")
          branch = os.environ["BRANCH_NAME"]
          full_sha = os.environ["FULL_SHA"]
          shortsha = full_sha[:7]
          workflow = os.environ["WORKFLOW_NAME"]
          repo = os.environ["REPO_NAME"]
          chat_id = os.environ["TG_CHAT_ID"]
          token = os.environ["TG_BOT_TOKEN"]

          status_map = {
              "success": "OK",
              "failure": "FAILED",
              "cancelled": "CANCELLED",
              "skipped": "SKIPPED",
          }
          status_label = status_map.get(status, status.upper())

          text = "\n".join([
              f"[DEPLOY][{status_label}] tg-relay",
              "",
              "service: tg-relay",
              f"mode: {mode}",
              f"branch: {branch}",
              f"sha: {shortsha}",
              f"workflow: {workflow}",
              f"repo: {repo}",
          ])

          url = f"https://api.telegram.org/bot{token}/sendMessage"
          payload = json.dumps(
              {
                  "chat_id": chat_id,
                  "text": text,
                  "disable_web_page_preview": True,
              }
          ).encode("utf-8")

          req = urllib.request.Request(
              url,
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          with urllib.request.urlopen(req, timeout=10) as resp:
              print(resp.read().decode("utf-8", errors="replace"))
          PY
