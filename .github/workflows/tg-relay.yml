name: tg-relay build and deploy

on:
  push:
    branches: ["main"]
    paths:
      - "tg-relay/**"
      - ".github/workflows/tg-relay.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: tg-relay-main
  cancel-in-progress: true

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./tg-relay
          file: ./tg-relay/Dockerfile
          push: true
          tags: |
            ghcr.io/elyablack/tg-relay:latest
            ghcr.io/elyablack/tg-relay:${{ github.sha }}

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail
            cd /srv/monitoring
            docker compose pull tg-relay
            docker compose up -d tg-relay
            docker image prune -af
