name: tg-relay

on:
  pull_request:
    paths:
      - "tg-relay/**"
      - ".github/workflows/tg-relay.yml"
  push:
    branches: ["main"]
    paths:
      - "tg-relay/**"
      - ".github/workflows/tg-relay.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: tg-relay-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./tg-relay
          file: ./tg-relay/Dockerfile
          push: false
          tags: ghcr.io/elyablack/tg-relay:pr-${{ github.event.pull_request.number }}

      - name: Build and push (main)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./tg-relay
          file: ./tg-relay/Dockerfile
          push: true
          tags: |
            ghcr.io/elyablack/tg-relay:latest
            ghcr.io/elyablack/tg-relay:${{ github.sha }}

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.readmode.outputs.mode }}
    steps:
      - name: Deploy on VPS (health-wait + rollback)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail
            cd /srv/monitoring

            wait_health() {
              for i in $(seq 1 30); do
                hs="$(docker inspect tg-relay --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' 2>/dev/null || echo none)"
                if [ "$hs" = "healthy" ] || [ "$hs" = "none" ]; then
                  return 0
                fi
                sleep 2
              done
              return 1
            }

            rm -f /tmp/tg-relay-deploy-mode

            export TG_RELAY_TAG=latest
            docker compose pull tg-relay
            docker compose up -d tg-relay

            if wait_health; then
              echo latest > /tmp/tg-relay-deploy-mode
              docker compose ps tg-relay
              exit 0
            fi

            export TG_RELAY_TAG=stable
            docker compose pull tg-relay || true
            docker compose up -d tg-relay

            if wait_health; then
              echo rollback > /tmp/tg-relay-deploy-mode
              docker compose ps tg-relay
              exit 0
            fi

            echo failed > /tmp/tg-relay-deploy-mode
            docker compose ps tg-relay
            exit 1

      - name: Read deploy mode (ssh)
        id: readmode
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p ${{ secrets.VPS_PORT }}"
          HOST="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          mode="$(ssh $SSH_OPTS "$HOST" 'cat /tmp/tg-relay-deploy-mode 2>/dev/null || echo unknown')"
          mode="$(printf '%s' "$mode" | tr -d '\r\n')"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"

  promote_stable:
    needs: deploy
    if: ${{ needs.deploy.result == 'success' && needs.deploy.outputs.mode == 'latest' }}
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote stable tag to current sha
        run: |
          docker buildx imagetools create \
            -t ghcr.io/elyablack/tg-relay:stable \
            ghcr.io/elyablack/tg-relay:${{ github.sha }}

  notify:
    needs: [deploy]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Notify telegram
        shell: bash
        run: |
          status="${{ needs.deploy.result }}"
          mode="${{ needs.deploy.outputs.mode }}"
          text="monitoring-stack: tg-relay deploy ${status} mode=${mode} branch=${{ github.ref_name }} sha=${{ github.sha }}"
          curl -fsS -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.TG_CHAT_ID }}\",\"text\":\"$text\",\"disable_web_page_preview\":true}"
