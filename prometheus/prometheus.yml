global:
  scrape_interval: 5s

scrape_configs:

  - job_name: "vps"
    static_configs:
      - targets: ["172.19.0.1:9100"]
        labels:
          instance_name: "vps-main"

  - job_name: "home1"
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ["100.103.137.9:9100"]
        labels:
          instance_name: "home-admin"

  - job_name: "home2"
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ["100.68.129.57:9100"]
        labels:
          instance_name: "home-lab"

  - job_name: "demo-app"
    scrape_interval: 5s
    metrics_path: /metrics
    static_configs:
      - targets: ["demo-app:8081"]
        labels:
          instance_name: "demo-app"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

rule_files:
  - "alerts.yml"
