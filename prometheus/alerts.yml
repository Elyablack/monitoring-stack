groups:
  - name: node
    rules:
      - alert: NodeExporterDown
        expr: up{job="nodes"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Node exporter down ({{ $labels.node }})"
          description: "Prometheus cannot scrape node_exporter on {{ $labels.instance_name }} ({{ $labels.instance }}) for 2m."
          runbook_url: "runbook:check-node-exporter"

      - alert: HostHighCpuLoad
        expr: 100 * (1 - avg by (instance, instance_name) (rate(node_cpu_seconds_total{mode="idle"}[5m]))) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage ({{ $labels.instance_name }})"
          description: "CPU usage > 90% for 10m on {{ $labels.instance_name }} ({{ $labels.instance }})."
          runbook_url: "runbook:cpu"

      - alert: HostLowDiskSpace
        expr: |
          (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} /
           node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100 < 10
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space ({{ $labels.instance_name }})"
          description: "Disk free < 10% for 10m on {{ $labels.instance_name }} ({{ $labels.instance }}), mount={{ $labels.mountpoint }}."
          runbook_url: "runbook:disk"

      - alert: HostMemoryPressure
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory pressure ({{ $labels.instance_name }})"
          description: "Memory used > 90% for 10m on {{ $labels.instance_name }} ({{ $labels.instance }})."
          runbook_url: "runbook:memory"

      - alert: HostRebootDetected
        expr: changes(node_boot_time_seconds[15m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Host reboot detected ({{ $labels.instance_name }})"
          description: "node_boot_time_seconds changed in last 15m for {{ $labels.instance_name }} ({{ $labels.instance }})."
          runbook_url: "runbook:reboot"

      - alert: BackupMissing
        expr: time() - backup_last_success_unixtime > 93600
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Backup missing or stale"
          description: "Last successful backup is older than 26 hours."
          runbook_url: "runbook:backup-missing"

  - name: demo-app
    rules:
      - alert: DemoAppDown
        expr: up{job="demo-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "demo-app is down ({{ $labels.instance_name }})"
          description: "Prometheus cannot scrape demo-app for 1m. target={{ $labels.instance }}"
          runbook_url: "runbook:demo-app-down"

      - alert: DemoAppHigh5xxRate
        expr: |
          (
            sum(rate(http_requests_total{service="demo-app",status=~"5.."}[45s]))
            /
            clamp_min(sum(rate(http_requests_total{service="demo-app"}[45s])), 1)
          ) > 0.15
        for: 45s
        labels:
          severity: demo
        annotations:
          summary: "demo-app high 5xx rate"
          description: "5xx ratio > 15% for 45s (service=demo-app)."
          runbook_url: "runbook:demo-app-5xx"

      - alert: DemoAppHighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(http_request_duration_seconds_bucket{service="demo-app"}[90s]))
          ) > 0.8
          and
          sum(rate(http_requests_total{service="demo-app"}[90s])) > 0.25
        for: 90s
        labels:
          severity: demo
        annotations:
          summary: "demo-app p95 latency high"
          description: "p95 latency > 0.8s for 90s with request rate > 0.25 req/s (service=demo-app)."
          runbook_url: "runbook:demo-app-latency"

      - alert: DemoAppHighInflight
        expr: http_inflight_requests{service="demo-app"} > 10
        for: 30s
        labels:
          severity: demo
        annotations:
          summary: "demo-app high inflight requests"
          description: "In-flight requests > 10 for 30s (service=demo-app)."
          runbook_url: "runbook:demo-app-inflight"

      - alert: DemoAppButtonError503
        expr: increase(app_forced_errors_total{service="demo-app",code="503"}[1m]) > 0
        for: 0m
        labels:
          severity: demo
        annotations:
          summary: "demo-app: button-generated 503"
          description: "Someone triggered /error?code=503 in the last 1m."
          runbook_url: "runbook:demo-button-503"

      - alert: DemoAppButtonSlow
        expr: increase(app_forced_latency_total{service="demo-app"}[1m]) > 0
        for: 0m
        labels:
          severity: demo
        annotations:
          summary: "demo-app: button-generated slow"
          description: "Someone triggered /slow in the last 1m."
          runbook_url: "runbook:demo-button-slow"
