services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    networks:
      - monitoring
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
      - ./data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.retention.size=300MB'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./grafana:/var/lib/grafana
    networks:
      - monitoring
    environment:
      - GF_SERVER_DOMAIN=grafana.142.93.143.228.nip.io
      - GF_SERVER_ROOT_URL=https://grafana.142.93.143.228.nip.io
      - GF_SERVER_ENFORCE_DOMAIN=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_BASIC_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: always
    networks:
      - monitoring
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./alertmanager:/etc/alertmanager:ro
      - ./alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'

  tg-relay:
    image: ghcr.io/elyablack/tg-relay:${TG_RELAY_TAG:-latest}
    container_name: tg-relay
    restart: always
    networks:
      - monitoring
    env_file:
      - ./tg-relay/tg.env
    environment:
      - PORT=8080
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: always
    networks:
      - monitoring
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki:/etc/loki:ro
      - ./loki-data:/loki
    command:
      - -config.file=/etc/loki/loki.yml

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: always
    networks:
      - monitoring
    volumes:
      - ./promtail:/etc/promtail
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - -config.file=/etc/promtail/promtail.yml

  demo-app:
    build:
      context: ./demo-app
    container_name: demo-app
    restart: always
    ports:
      - "127.0.0.1:8081:8081"
    networks:
      - monitoring
    environment:
      - APP_NAME=demo-app
      - ENV=prod
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >
          import urllib.request;
          urllib.request.urlopen("http://127.0.0.1:8081/healthz", timeout=2).read()
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

networks:
  monitoring:
    external: true
