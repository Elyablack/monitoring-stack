services:
  prometheus:
    image: prom/prometheus@sha256:4a61322ac1103a0e3aea2a61ef1718422a48fa046441f299d71e660a3bc71ae9
    container_name: prometheus
    restart: always
    networks:
      - monitoring
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
      - ./data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.retention.size=300MB'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana@sha256:b0ae311af06228bcfd4a620504b653db80f5b91e94dc3dc2a5b7dab202bcde20
    container_name: grafana
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./grafana:/var/lib/grafana
    networks:
      - monitoring
    environment:
      - GF_SERVER_DOMAIN=grafana.142.93.143.228.nip.io
      - GF_SERVER_ROOT_URL=https://grafana.142.93.143.228.nip.io
      - GF_SERVER_ENFORCE_DOMAIN=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_BASIC_ENABLED=true
      - GF_USERS_ALLOW_SIGN_UP=false

  alertmanager:
    image: prom/alertmanager@sha256:88b605de9aba0410775c1eb3438f951115054e0d307f23f274a4c705f51630c1
    container_name: alertmanager
    restart: always
    networks:
      - monitoring
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./alertmanager:/etc/alertmanager:ro
      - ./alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'

  tg-relay:
    image: ghcr.io/elyablack/tg-relay:${TG_RELAY_TAG:-latest}
    container_name: tg-relay
    restart: always
    networks:
      - monitoring
    env_file:
      - ./tg-relay/tg.env
    environment:
      PORT: "8080"
      APP_VERSION: "${TG_RELAY_TAG:-latest}"
    expose:
      - "8080"
    labels:
      tag: "${TG_RELAY_TAG:-latest}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  loki:
    image: grafana/loki@sha256:3c8fd3570dd9219951a60d3f919c7f31923d10baee578b77bc26c4a0b32d092d
    container_name: loki
    restart: always
    networks:
      - monitoring
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki:/etc/loki:ro
      - ./loki-data:/loki
    command:
      - -config.file=/etc/loki/loki.yml

  promtail:
    image: grafana/promtail@sha256:51346af8682f7a664affaca4f34a62f5a4f0f83ace9931df94590375a94ff8f1
    container_name: promtail
    restart: always
    networks:
      - monitoring
    ports:
      - "127.0.0.1:9080:9080"
    volumes:
      - ./promtail:/etc/promtail
      - ./promtail-positions:/var/lib/promtail
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - -config.file=/etc/promtail/promtail.yml

  demo-app:
    image: ghcr.io/elyablack/demo-app:${DEMO_APP_TAG:-latest}
    container_name: demo-app
    restart: always
    ports:
      - "127.0.0.1:8081:8081"
    networks:
      - monitoring
    env_file:
      - ./demo-app/.env
    environment:
      APP_VERSION: "${DEMO_APP_TAG:-latest}"
      READY_URLS: "http://loki:3100/ready,http://alertmanager:9093/-/ready"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >
          import urllib.request;
          urllib.request.urlopen("http://127.0.0.1:8081/healthz", timeout=2).read()
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

networks:
  monitoring:
    external: true
