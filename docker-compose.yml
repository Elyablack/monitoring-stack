services:
  prometheus:
    image: prom/prometheus@sha256:e4254400b85610324913f0dc4acf92603d9984e7519414c5a12811aa6146acc3
    container_name: prometheus
    restart: always
    networks:
      - monitoring
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
      - ./data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.retention.size=300MB'
      - '--web.enable-lifecycle'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256

  grafana:
    image: grafana/grafana@sha256:0f86bada30d65ef9d0183b90c1e2682ac92d53d95da8bed322b984ea78a4a73a
    container_name: grafana
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./grafana:/var/lib/grafana
    networks:
      - monitoring
    environment:
      - GF_SERVER_DOMAIN=grafana.142.93.143.228.nip.io
      - GF_SERVER_ROOT_URL=https://grafana.142.93.143.228.nip.io
      - GF_SERVER_ENFORCE_DOMAIN=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_BASIC_ENABLED=true
      - GF_USERS_ALLOW_SIGN_UP=false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256

  alertmanager:
    image: prom/alertmanager@sha256:51a825c2a40acc3e338fdd00d622e01ec090f72be2b3ea46be0839cd47a4d286
    container_name: alertmanager
    restart: always
    networks:
      - monitoring
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./alertmanager:/etc/alertmanager:ro
      - ./alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256

  tg-relay:
    image: ghcr.io/elyablack/tg-relay:${TG_RELAY_TAG:-stable}
    container_name: tg-relay
    restart: always
    networks:
      - monitoring
    env_file:
      - ./tg-relay/tg.env
    environment:
      PORT: "8080"
      APP_VERSION: "${TG_RELAY_TAG:-latest}"
    ports:
      - "127.0.0.1:8082:8080"
    expose:
      - "8080"
    labels:
      tag: "${TG_RELAY_TAG:-latest}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256

  loki:
    image: grafana/loki@sha256:73e905b51a7f917f7a1075e4be68759df30226e03dcb3cd2213b989cc0dc8eb4
    container_name: loki
    restart: always
    networks:
      - monitoring
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki:/etc/loki:ro
      - ./loki-data:/loki
    command:
      - -config.file=/etc/loki/loki.yml
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256

  promtail:
    image: grafana/promtail@sha256:6cfa64ec432b24a912d640e2edb940eeae2666f61861a66c121d763dd7241381
    container_name: promtail
    restart: always
    networks:
      - monitoring
    ports:
      - "127.0.0.1:9080:9080"
    volumes:
      - ./promtail:/etc/promtail
      - ./promtail-positions:/var/lib/promtail
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - -config.file=/etc/promtail/promtail.yml
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256

  demo-app:
    image: ghcr.io/elyablack/demo-app:${DEMO_APP_TAG:-stable}
    container_name: demo-app
    restart: always
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - /srv/control-plane/state/reviews/weekly:/srv/control-plane/state/reviews/weekly:ro
    networks:
      - monitoring
    env_file:
      - ./demo-app/.env
    environment:
      APP_VERSION: "${DEMO_APP_TAG:-latest}"
      READY_URLS: "http://loki:3100/ready,http://alertmanager:9093/-/ready"
      CONTROL_PLANE_ENABLED: "true"
      ACTION_RUNNER_URL: "http://172.19.0.1:8088"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >
          import urllib.request;
          urllib.request.urlopen("http://127.0.0.1:8081/healthz", timeout=2).read()
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256

networks:
  monitoring:
    external: true
